<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module E Test</title>

<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
.container {max-width:800px;margin:auto;padding:20px;background:white;}
h1 {text-align:center;}
input, textarea {width:100%; padding:8px; margin:5px 0;}
button {padding:10px; margin-top:10px; cursor:pointer;}
.question {margin:20px 0; padding:15px; border:1px solid #ddd;}
</style>
</head>

<body>

<div class="container">

<h1>Module E Test</h1>

Name: <input id="name">
Class: <input id="class">

<hr>

<div class="question">
<b>1. What are we told about procrastination?</b><br>
<input type="checkbox" id="q1_1"> misunderstood<br>
<input type="checkbox" id="q1_2"> common<br>
<input type="checkbox" id="q1_3"> always good<br>
</div>

<div class="question">
<b>2. Give TWO reasons for procrastination</b><br>
<textarea id="q2a"></textarea>
<textarea id="q2b"></textarea>
</div>

<button onclick="submitTest()">Submit</button>

<h2 id="score"></h2>

</div>

<script>

// YOUR GOOGLE SCRIPT URL
const APPS_URL = "https://script.google.com/macros/s/AKfycbykMDYp5fRG-Cs5CfM9518yiF-zeA8k0dHKwedHOapMFxMj5w9SyJtkJVOAieUaKD0n/exec";

function submitTest(){

  const name = document.getElementById("name").value.trim();

  if(name === ""){
    alert("You must enter your name");
    return;
  }

  let reading = 0;
  let vocab = 0;

  // Q1 grading
  const q1_correct = document.getElementById("q1_1").checked && document.getElementById("q1_2").checked;
  const q1_extra = document.getElementById("q1_3").checked;

  if(q1_correct && !q1_extra) reading += 14;
  else if(q1_correct || (document.getElementById("q1_1").checked || document.getElementById("q1_2").checked)) reading += 7;

  // Q2 grading (simple keyword)
  const a = document.getElementById("q2a").value.toLowerCase();
  const b = document.getElementById("q2b").value.toLowerCase();

  let score2 = 0;

  if(a.includes("stress") || b.includes("stress")) score2 += 8;
  if(a.includes("overwhelming") || b.includes("overwhelming")) score2 += 8;

  reading += score2;

  const total = reading + vocab;

  document.getElementById("score").innerText = "Score: " + total;

  // SEND TO GOOGLE SHEETS
  fetch(APPS_URL, {
    method: "POST",
    body: JSON.stringify({
      name: name,
      class: document.getElementById("class").value,
      reading: reading,
      vocab: vocab,
      total: total
    })
  });

}

</script>

</body>
</html>
